<!DOCTYPE html>
<html>
<head>
    <title>Zigbee Migration Tool</title>
    <link rel="stylesheet" href="static/style.css?v=0.1.0">
</head>
<body>
<div class="container">
    <div class="header-container">
        <h1>Zigbee Migration Tool</h1>
    </div>

    <div id="status"></div>

    <form id="migrationForm">
        <div class="device-grid">
            {% if zha_devices %}
                {% for device in zha_devices %}
                <label class="device-label">
                    <input type="checkbox" name="ieee" value="{{ device.ieee }}" class="hidden-checkbox" checked>
                    <div class="card-content">
                        <div class="card-header">
                            {{ device.friendly_name if device.friendly_name else "Unknown Device" }}
                        </div>
                        <div class="card-details">
                            <div class="detail-row">
                                <span class="detail-label">IEEE</span>
                                <span class="detail-value">{{ device.ieee }}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Manufacturer</span>
                                <span class="detail-value">{{ device.manufacturer }}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Model</span>
                                <span class="detail-value">{{ device.model }}</span>
                            </div>
                        </div>
                    </div>
                </label>
                {% endfor %}
            {% else %}
                <div class="card-content no-devices-card">
                    <div class="card-header">No Devices Found</div>
                    <div class="card-details">
                        <p>No new devices were discovered in ZHA that are not already in Zigbee2MQTT.</p>
                    </div>
                </div>
            {% endif %}
        </div>

        <div class="actions">
            <label for="direction" class="select-label">Migration Direction:</label>
            <select id="direction">
                <option value="zha_to_z2m">ZHA to Zigbee2MQTT</option>
            </select>
            <button type="submit" id="submitBtn" {% if not zha_devices %}disabled{% endif %}>Start Migration</button>
        </div>
    </form>
</div>

<script src="static/app.js?v=0.1.0"></script>
</body>
</html>
